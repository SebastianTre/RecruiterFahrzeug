<style th:fragment="fahrzeugCSS">
            /* sorgt dafür, dass die Eingabefelder immer die gleiche Breite haben */
            .form-control {
                width: 100%; /* Die Eingabefelder nehmen die volle Breite des Containers ein */
                max-width: 50%; /* Es wird eine Obergrenze von 50% gesetzt */
            }

            /* Container für Fehlermeldungen und Erfolgsnachrichten */
            .invalid-feedback {
                display: block;
                visibility: hidden; /* Initial unsichtbar */
                min-height: 12px; /* Reserveplatz für eine Nachricht */
                padding-bottom: 5px; /* Abstand nach oben */
                width: 50%;
            }


            /* Sichtbar machen der Nachricht, wenn sie aktiv ist */
                .is-invalid ~ .invalid-feedback,
                .is-valid ~ .valid-feedback {
                visibility: visible;
            }

        </style>
